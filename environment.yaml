name: viptreegen
channels:
  - conda-forge
  - bioconda
dependencies:
  - blast >=2.9       # required only when --mode tblastx (default)
  - mmseqs2 >=13      # required only when --mode mmseqs (translated all-vs-all)
  - ruby >=3.0
  - r-base >=3.0
  - r-ape
  - r-phangorn
  - parallel
  - duckdb >=1.0  # CLI used to aggregate run state into ${outdir}/run.duckdb
  - rust          # build-time only: needed to compile the bundled viptreegen-summary-pre binary from a source clone (not a runtime dep; skip if installed via Bioconda)
