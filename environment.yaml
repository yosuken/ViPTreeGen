name: viptreegen
channels:
  - bioconda
  - conda-forge
dependencies:
  - blast >=2.9       # required only when --mode tblastx (default)
  - mmseqs2 >=13      # required only when --mode mmseqs (translated all-vs-all)
  - ruby >=2.0
  - r-base >=3.0
  - r-ape
  - r-phangorn
  - parallel
  - duckdb >=1.0  # CLI used to aggregate run state into ${outdir}/run.duckdb
  - rust          # required to build the bundled viptreegen-summary-pre binary from source (skip if using a Bioconda install)
